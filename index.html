<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>墨韵诗林 — 少儿古诗背诵助手</title>
    <meta
      name="description"
      content="水墨国风古诗词背诵应用，72首小学必背古诗，支持语音朗读和磨耳朵模式"
    />
    <meta name="theme-color" content="#f5f0e6" />

    <!-- 页签图标 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- 字体：霞鹜文楷 + 马山正 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Ma+Shan+Zheng&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 水墨粒子背景 -->
      <div class="ink-bg"></div>

      <!-- 顶部导航 -->
      <header class="app-header" id="appHeader">
        <div class="header-left">
          <span class="logo-icon">墨</span>
          <h1 class="app-title">墨韵诗林</h1>
        </div>
        <button class="icon-btn" id="settingsBtn" aria-label="设置">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </header>

      <!-- 主内容区 -->
      <main class="app-main" id="appMain">
        <!-- 诗单视图 -->
        <section class="tab-view active" id="poemListView"></section>
        <!-- 磨耳朵视图 -->
        <section class="tab-view" id="listenView"></section>
      </main>

      <!-- 底部导航 -->
      <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-tab="poems" id="navPoems">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          <span>诗单</span>
        </button>
        <button class="nav-item" data-tab="listen" id="navListen">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
          <span>磨耳朵</span>
        </button>
      </nav>

      <!-- 诗歌详情模态框 -->
      <div class="modal-overlay hidden" id="poemDetailModal"></div>

      <!-- 设置面板 -->
      <div class="modal-overlay hidden" id="settingsModal"></div>

      <!-- 全局提示 -->
      <div class="toast hidden" id="toast"></div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
